# Traductions Devise FR pour Vera Trade.
# Basé sur les messages standard de devise-i18n, adapté au ton éditorial.
fr:
  devise:
    confirmations:
      confirmed: "Votre compte a été confirmé avec succès."
      send_instructions: "Vous allez recevoir dans quelques minutes un email contenant les instructions de confirmation de votre compte."
      send_paranoid_instructions: "Si votre compte existe, vous allez recevoir dans quelques minutes un email contenant les instructions de confirmation."
    failure:
      already_authenticated: "Vous êtes déjà connecté."
      inactive: "Votre compte n'est pas encore activé."
      invalid: "%{authentication_keys} ou mot de passe invalide."
      locked: "Votre compte est verrouillé."
      last_attempt: "Vous avez encore une tentative avant que votre compte ne soit verrouillé."
      not_found_in_database: "%{authentication_keys} ou mot de passe invalide."
      timeout: "Votre session a expiré, veuillez vous reconnecter pour continuer."
      unauthenticated: "Vous devez vous connecter ou créer un compte pour continuer."
      unconfirmed: "Vous devez confirmer votre compte avant de continuer."
    mailer:
      confirmation_instructions:
        subject: "Instructions de confirmation"
      reset_password_instructions:
        subject: "Instructions pour réinitialiser votre mot de passe"
      unlock_instructions:
        subject: "Instructions pour déverrouiller votre compte"
      email_changed:
        subject: "Email modifié"
      password_change:
        subject: "Mot de passe modifié"
    omniauth_callbacks:
      failure: "Nous n'avons pas pu vous authentifier via %{kind} : %{reason}."
      success: "Authentification réussie via le compte %{kind}."
    passwords:
      no_token: "Vous ne pouvez accéder à cette page sans passer par un email de réinitialisation du mot de passe. Si vous venez d'un email, vérifiez que vous avez utilisé l'URL complète."
      send_instructions: "Vous allez recevoir par email les instructions de réinitialisation de votre mot de passe dans quelques minutes."
      send_paranoid_instructions: "Si votre email existe, vous recevrez un lien de réinitialisation dans quelques minutes."
      updated: "Votre mot de passe a été modifié avec succès. Vous êtes maintenant connecté."
      updated_not_active: "Votre mot de passe a été modifié avec succès."
    registrations:
      destroyed: "Au revoir ! Votre compte a été annulé. Nous espérons vous revoir bientôt."
      signed_up: "Bienvenue ! Vous avez créé votre compte avec succès."
      signed_up_but_inactive: "Vous avez créé votre compte avec succès. Vous ne pouvez toutefois pas vous connecter car votre compte n'est pas encore activé."
      signed_up_but_locked: "Vous avez créé votre compte avec succès. Vous ne pouvez toutefois pas vous connecter car votre compte est verrouillé."
      signed_up_but_unconfirmed: "Un message avec un lien de confirmation a été envoyé à votre adresse email. Suivez ce lien pour activer votre compte."
      update_needs_confirmation: "Vos informations ont été mises à jour. Vous devez confirmer votre nouvelle adresse email. Suivez le lien qui a été envoyé pour finaliser la confirmation."
      updated: "Votre compte a été mis à jour avec succès."
      updated_but_not_signed_in: "Votre compte a été mis à jour avec succès, mais nous avons eu besoin de vous déconnecter. Merci de vous reconnecter."
    sessions:
      signed_in: "Connecté avec succès."
      signed_out: "Déconnecté avec succès."
      already_signed_out: "Déconnecté avec succès."
    unlocks:
      send_instructions: "Vous allez recevoir dans quelques minutes un email contenant les instructions pour déverrouiller votre compte."
      send_paranoid_instructions: "Si votre compte existe, vous recevrez un email de déverrouillage dans quelques minutes."
      unlocked: "Votre compte a été déverrouillé avec succès. Veuillez vous connecter pour continuer."
  errors:
    messages:
      already_confirmed: "a déjà été confirmé, veuillez vous connecter"
      confirmation_period_expired: "doit être confirmé dans les %{period}, veuillez en demander un nouveau"
      expired: "a expiré, veuillez en demander un nouveau"
      not_found: "n'a pas été trouvé(e)"
      not_locked: "n'était pas verrouillé"
      not_saved:
        one: "Une erreur empêche l'enregistrement de %{resource} :"
        other: "%{count} erreurs empêchent l'enregistrement de %{resource} :"
