# Locale française pour Vera Trade — couverture ActiveRecord + date/time FR.
fr:
  date:
    abbr_day_names: [dim, lun, mar, mer, jeu, ven, sam]
    abbr_month_names:
      - ~
      - janv.
      - févr.
      - mars
      - avr.
      - mai
      - juin
      - juil.
      - août
      - sept.
      - oct.
      - nov.
      - déc.
    day_names: [dimanche, lundi, mardi, mercredi, jeudi, vendredi, samedi]
    formats:
      default: "%d/%m/%Y"
      long: "%-d %B %Y"
      short: "%-d %b"
    month_names:
      - ~
      - janvier
      - février
      - mars
      - avril
      - mai
      - juin
      - juillet
      - août
      - septembre
      - octobre
      - novembre
      - décembre
    order: [day, month, year]

  time:
    am: "am"
    pm: "pm"
    formats:
      default: "%-d %B %Y, %Hh%M"
      long: "%A %-d %B %Y, %Hh%M"
      short: "%-d %b %Hh%M"

  errors:
    format: "%{attribute} %{message}"
    messages:
      accepted: doit être accepté(e)
      blank: doit être rempli(e)
      confirmation: ne concorde pas avec la confirmation
      empty: doit être rempli(e)
      equal_to: doit être égal à %{count}
      even: doit être pair
      exclusion: n'est pas disponible
      greater_than: doit être supérieur à %{count}
      greater_than_or_equal_to: doit être supérieur ou égal à %{count}
      inclusion: n'est pas inclus(e) dans la liste
      invalid: n'est pas valide
      less_than: doit être inférieur à %{count}
      less_than_or_equal_to: doit être inférieur ou égal à %{count}
      model_invalid: "La validation a échoué : %{errors}"
      not_a_number: n'est pas un nombre
      not_an_integer: doit être un nombre entier
      odd: doit être impair
      other_than: doit être différent de %{count}
      present: doit être vide
      required: doit exister
      taken: est déjà utilisé
      too_long:
        one: est trop long (pas plus d'un caractère)
        other: est trop long (pas plus de %{count} caractères)
      too_short:
        one: est trop court (au moins un caractère)
        other: est trop court (au moins %{count} caractères)
      wrong_length:
        one: ne fait pas la bonne longueur (doit comporter un seul caractère)
        other: ne fait pas la bonne longueur (doit comporter %{count} caractères)

  activerecord:
    errors:
      messages:
        record_invalid: "La validation a échoué : %{errors}"
        restrict_dependent_destroy:
          has_one: "Impossible de supprimer l'enregistrement car un(e) %{record} dépendant(e) existe"
          has_many: "Impossible de supprimer l'enregistrement car des %{record} dépendants existent"
    models:
      user: Utilisateur
      listing: Annonce
      vehicle: Véhicule
    attributes:
      user:
        email: Email
        password: Mot de passe
        password_confirmation: Confirmation du mot de passe
        current_password: Mot de passe actuel
        first_name: Prénom
        last_name: Nom
        phone: Téléphone
      listing:
        title: Titre
        description: Description
        status: Statut
        photos: Photos
      vehicle:
        make: Marque
        model: Modèle
        year: Année
        price: Prix
        kilometers: Kilométrage
        vin: VIN
        license_plate: Immatriculation

  helpers:
    submit:
      create: Créer %{model}
      submit: Enregistrer %{model}
      update: Mettre à jour %{model}
