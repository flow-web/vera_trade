name: vera-trade

services:
  db:
    image: postgres:16-alpine
    container_name: vera-trade-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vera_trade_real
      POSTGRES_PASSWORD: ${VERA_TRADE_REAL_DATABASE_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - vera_trade_pg_data:/var/lib/postgresql/data
    networks:
      - vera-trade-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vera_trade_real"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: vera-trade-web:latest
    container_name: vera-trade-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
      RAILS_SERVE_STATIC_FILES: "true"
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      DATABASE_HOST: ${DATABASE_HOST}
      VERA_TRADE_REAL_DATABASE_PASSWORD: ${VERA_TRADE_REAL_DATABASE_PASSWORD}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      MAIL_FROM: ${MAIL_FROM}
    ports:
      # Bind localhost only — reverse-proxied by flowmotor-nginx for public access
      - "127.0.0.1:8098:80"
    networks:
      - vera-trade-net
      - flowmotor-crm_flowmotor  # shared with flowmotor-nginx so it can route here

networks:
  vera-trade-net:
    driver: bridge
  flowmotor-crm_flowmotor:
    external: true

volumes:
  vera_trade_pg_data:
    driver: local
